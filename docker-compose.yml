services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-oj-postgres
    environment:
      POSTGRES_USER: llm_oj
      POSTGRES_PASSWORD: llm_oj
      POSTGRES_DB: llm_oj
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U llm_oj -d llm_oj']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
